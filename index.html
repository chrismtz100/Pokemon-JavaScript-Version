<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
  <script defer src="./script.js"></script>
  <link rel="shortcut icon" href="#">
  <title>Pokemon: JavaScript Version</title>
</head>

<body>

  <!-- ======================================================
       SETUP SCREEN — Team generation and options
  ====================================================== -->
  <div id="setup-screen">
    <h1>Pokemon<br/>JS Version</h1>

    <div id="buttons">
      <form id="pokemon-data">
        <div class="search-bar">
          <input type="text" id="search" placeholder="Search Pokemon" />
          <input type="submit" id="submit" value="Submit" />
        </div>

        <button type="button" id="btn-gen-p1"      class="kanto"  onclick="Gen1Button()">Generate P1 Team</button>
        <button type="button" id="btn-gen-p2"      class="johto"  onclick="Gen2Button()">Generate P2 Team</button>
        <button type="button" id="btn-mode-toggle" class="sinnoh" onclick="toggleMode()">Mode: 1 Player (vs CPU)</button>
        <button type="button" id="btn-battle"      class="hoenn"  onclick="startBattle()" disabled>Battle!</button>
      </form>
    </div>

    <!-- Team preview cards appear here after generation -->
    <div id="team-preview" class="container"></div>
  </div>

  <!-- ======================================================
       BATTLE SCREEN — Hidden until Battle! is clicked
  ====================================================== -->
  <div id="battle-screen" style="display:none;">

    <!-- Enemy (Player 2) status row -->
    <div class="battle-info-row battle-info-enemy">
      <div class="team-icons" id="p2-team-icons"></div>
      <div class="pokemon-status-box">
        <div class="status-name-row">
          <span class="poke-name" id="p2-name">ENEMY</span>
          <span class="poke-level">Lv50</span>
        </div>
        <div class="hp-bar-container">
          <div class="hp-bar hp-green" id="p2-hp-bar" style="width:100%;"></div>
        </div>
        <span class="hp-text" id="p2-hp-text">---/---</span>
      </div>
    </div>

    <!-- Battle arena: enemy sprite left, player sprite right -->
    <div class="battle-arena">
      <div class="enemy-sprite-box">
        <img id="p2-sprite" src="" alt="Enemy Pokemon" />
      </div>
      <div class="player-sprite-box">
        <img id="p1-sprite" src="" alt="Your Pokemon" />
      </div>
    </div>

    <!-- Player (Player 1) status row -->
    <div class="battle-info-row battle-info-player">
      <div class="pokemon-status-box">
        <div class="status-name-row">
          <span class="poke-name" id="p1-name">PLAYER</span>
          <span class="poke-level">Lv50</span>
        </div>
        <div class="hp-bar-container">
          <div class="hp-bar hp-green" id="p1-hp-bar" style="width:100%;"></div>
        </div>
        <span class="hp-text" id="p1-hp-text">---/---</span>
      </div>
      <div class="team-icons" id="p1-team-icons"></div>
    </div>

    <!-- Battle message box (current action) -->
    <div id="battle-message-box">
      <p id="battle-log-text">...</p>
    </div>

    <!-- Move selection: 4 buttons in 2x2 grid -->
    <div id="move-panel">
      <button class="move-btn" id="move-0" onclick="playerSelectMove(0)">---</button>
      <button class="move-btn" id="move-1" onclick="playerSelectMove(1)">---</button>
      <button class="move-btn" id="move-2" onclick="playerSelectMove(2)">---</button>
      <button class="move-btn" id="move-3" onclick="playerSelectMove(3)">---</button>
    </div>

    <!-- Scrollable battle history -->
    <div id="battle-log-scroll">
      <ul id="battle-log-list"></ul>
    </div>

    <!-- Play again button (shown when game ends) -->
    <button id="btn-play-again" style="display:none;" onclick="resetGame()">Play Again</button>

  </div><!-- end #battle-screen -->

</body>
</html>
